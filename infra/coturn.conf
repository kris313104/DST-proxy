# coturn config for the DST proximity-voice TURN relay (NAT fallback).
# Install coturn, edit the CHANGE_ME values, run: turnserver -c coturn.conf

listening-port=3478
# tls-listening-port=5349           # enable for turns:// (recommended in production)
fingerprint
realm=dst-proximity

# --- Option A: static long-term credentials (simplest; works with TURN_URL today) ---
# Set on the signaling server:  TURN_URL=turn:proxyuser:CHANGE_ME_PASSWORD@YOUR.HOST:3478?transport=udp
lt-cred-mech
user=proxyuser:CHANGE_ME_PASSWORD

# --- Option B: time-limited REST credentials (more secure; needs object-form ICE on the
#     client — a future enhancement). Comment out Option A and use: ---
# use-auth-secret
# static-auth-secret=CHANGE_ME_LONG_RANDOM_SECRET

# Relay port range (open these in the firewall).
min-port=49152
max-port=65535

# external-ip=YOUR.PUBLIC.IP        # set if the server is behind NAT/cloud
no-multicast-peers
no-cli
# verbose
